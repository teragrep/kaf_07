services:
  # ipa
  ipa:
    hostname: 'ipa.kafka3-cluster.dev.test'
    container_name: 'ipa'
    build:
      context: './'
      dockerfile: './Dockerfile.ipa'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.100
        ipv6_address: fd12:4567:789a:1::100
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ./files/ipa_01_server.env:/ipa_01.conf.d/env/server.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    healthcheck:
      test: ["CMD-SHELL", "[ -f /ipa_01.ready ] && ipactl status"]
      interval: 10s
      retries: 54
      start_period: 60s
      timeout: 10s

  # broker-one
  broker-one:
    hostname: 'broker-one.kafka3-cluster.dev.test'
    container_name: 'broker-one'
    build:
      context: './'
      dockerfile: './Dockerfile.cluster'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.101
        ipv6_address: fd12:4567:789a:1::101
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ./files/ipa_01_client.env:/ipa_01.conf.d/env/client.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    depends_on:
      ipa:
        condition: service_healthy

  # combined-two
  combined-two:
    hostname: 'combined-two.kafka3-cluster.dev.test'
    container_name: 'combined-two'
    build:
      context: './'
      dockerfile: './Dockerfile.cluster'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.102
        ipv6_address: fd12:4567:789a:1::102
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ./files/ipa_01_client.env:/ipa_01.conf.d/env/client.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    depends_on:
      ipa:
        condition: service_healthy

  # combined-three
  combined-three:
    hostname: 'combined-three.kafka3-cluster.dev.test'
    container_name: 'combined-three'
    build:
      context: './'
      dockerfile: './Dockerfile.cluster'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.103
        ipv6_address: fd12:4567:789a:1::103
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ./files/ipa_01_client.env:/ipa_01.conf.d/env/client.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    depends_on:
      ipa:
        condition: service_healthy

  # controller-four
  controller-four:
    hostname: 'controller-four.kafka3-cluster.dev.test'
    container_name: 'controller-four'
    build:
      context: './'
      dockerfile: './Dockerfile.cluster'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.104
        ipv6_address: fd12:4567:789a:1::104
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ./files/ipa_01_client.env:/ipa_01.conf.d/env/client.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    depends_on:
      ipa:
        condition: service_healthy

  # manager
  manager:
    hostname: 'manager.kafka3-cluster.dev.test'
    container_name: 'manager'
    build:
      context: './'
      dockerfile: './Dockerfile.manager'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    networks:
      kafka3-cluster.dev.test:
        ipv4_address: 192.168.122.105
        ipv6_address: fd12:4567:789a:1::105
    privileged: false
    tty: true
    volumes:
      - shared:/shared
      - type: tmpfs
        target: /run
      - ${RUNNER_TEMP}:/return
      - ./files/ipa_01_client.env:/ipa_01.conf.d/env/client.env
      - ./files/ipa_01_common.env:/ipa_01.conf.d/env/common.env
    depends_on:
      ipa:
        condition: service_healthy

# Shared volume for the shared files
volumes:
  shared:
    driver: local
    driver_opts:
      type: "tmpfs"
      device: "tmpfs"

# Network
networks:
  kafka3-cluster.dev.test:
    name: kafka3-cluster.dev.test
    enable_ipv6: true
    ipam:
      driver: default
      config:
       - subnet: 192.168.122.0/24
         gateway: 192.168.122.1
       - subnet: fd12:4567:789a:1::/64
         gateway: fd12:4567:789a:1::1
